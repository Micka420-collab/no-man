name: Déployer sur GitHub Pages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Mise à jour des actualités NMS"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurer Pages (active le site si nécessaire)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
