name: Mise à jour des actualités NMS

on:
  schedule:
    # Toutes les 3 heures (événement communautaire suivi en direct)
    - cron: "17 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer les actualités
        run: python3 scripts/fetch_news.py

      - name: Récupérer les classements du marché
        run: python3 scripts/fetch_market.py

      - name: Mettre à jour la base de données d'objets
        run: python3 scripts/fetch_catalogue.py

      - name: Commit des données si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "Aucun changement."
          else
            git commit -m "data: mise à jour automatique des actualités"
            git push
          fi
