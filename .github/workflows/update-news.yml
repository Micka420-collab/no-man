name: Mise à jour des actualités NMS

on:
  schedule:
    # Toutes les 6 heures
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Récupérer les actualités
        run: python3 scripts/fetch_news.py

      - name: Commit des données si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/official.json data/community.json
          if git diff --cached --quiet; then
            echo "Aucun changement."
          else
            git commit -m "data: mise à jour automatique des actualités"
            git push
          fi
