<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Man's Sky — Centre de suivi</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg-card: #131a2e;
    --bg-card-hover: #1a2340;
    --border: #263354;
    --text: #dde4f5;
    --text-dim: #8b96b8;
    --accent: #e8443a;
    --accent2: #4ec9b0;
    --accent3: #f5c542;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 10%, #1a1035 0%, transparent 40%),
                      radial-gradient(circle at 80% 90%, #0d2438 0%, transparent 40%);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    line-height: 1.55;
    min-height: 100vh;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 80px; }
  header { text-align: center; padding: 36px 0 20px; }
  header h1 { font-size: 2rem; letter-spacing: 2px; text-transform: uppercase; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-dim); margin-top: 6px; }
  .updated { font-size: .85rem; color: var(--text-dim); text-align: center; margin-bottom: 24px; }

  nav.tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
  nav.tabs button {
    background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
    padding: 10px 20px; border-radius: 999px; cursor: pointer; font-size: .95rem;
    transition: all .15s;
  }
  nav.tabs button:hover { background: var(--bg-card-hover); }
  nav.tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  section.panel { display: none; }
  section.panel.active { display: block; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px 18px; transition: border-color .15s;
  }
  .card:hover { border-color: var(--accent2); }
  .card h3 { font-size: 1.02rem; margin-bottom: 6px; }
  .card h3 a { color: var(--text); text-decoration: none; }
  .card h3 a:hover { color: var(--accent2); }
  .card .meta { font-size: .8rem; color: var(--text-dim); margin-bottom: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
  .card .excerpt { font-size: .88rem; color: var(--text-dim); }
  .badge {
    display: inline-block; font-size: .72rem; padding: 2px 9px; border-radius: 999px;
    background: rgba(78,201,176,.15); color: var(--accent2); border: 1px solid rgba(78,201,176,.35);
  }
  .badge.official { background: rgba(232,68,58,.15); color: #ff8a80; border-color: rgba(232,68,58,.4); }

  /* Progression */
  .progress-summary {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; margin-bottom: 20px; text-align: center;
  }
  .progress-summary .pct { font-size: 2.6rem; font-weight: 700; color: var(--accent3); }
  .bar { height: 10px; background: #0d1425; border-radius: 999px; overflow: hidden; margin-top: 12px; }
  .bar > div { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent3)); border-radius: 999px; transition: width .4s; }
  .cat { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
  .cat-head {
    display: flex; align-items: center; gap: 12px; padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .cat-head:hover { background: var(--bg-card-hover); }
  .cat-head .icon { font-size: 1.3rem; }
  .cat-head h3 { flex: 1; font-size: 1.05rem; }
  .cat-head .count { font-size: .85rem; color: var(--text-dim); }
  .cat .minibar { height: 5px; background: #0d1425; }
  .cat .minibar > div { height: 100%; background: var(--accent2); transition: width .4s; }
  .cat ul { list-style: none; padding: 6px 12px 14px; display: none; }
  .cat.open ul { display: block; }
  .cat li { padding: 4px 6px; }
  .cat label { display: flex; gap: 12px; align-items: flex-start; cursor: pointer; padding: 6px 8px; border-radius: 8px; }
  .cat label:hover { background: var(--bg-card-hover); }
  .cat input[type=checkbox] {
    width: 19px; height: 19px; margin-top: 2px; accent-color: var(--accent2); cursor: pointer; flex-shrink: 0;
  }
  .cat li.done label span { color: var(--text-dim); text-decoration: line-through; }
  .toolbar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
  .toolbar button {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: .85rem;
  }
  .toolbar button:hover { color: var(--text); border-color: var(--accent2); }

  .subtabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .subtabs button {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: .88rem;
  }
  .subtabs button.active { color: var(--accent3); border-color: var(--accent3); }
  .empty { text-align: center; color: var(--text-dim); padding: 40px 0; }
  .note {
    background: rgba(245,197,66,.08); border: 1px solid rgba(245,197,66,.3); color: var(--accent3);
    border-radius: var(--radius); padding: 12px 16px; font-size: .85rem; margin-bottom: 18px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>No Man's <span>Sky</span> — Centre de suivi</h1>
    <p>Actualités, avancées de la communauté et ta progression dans le jeu</p>
  </header>
  <div class="updated" id="updated"></div>

  <nav class="tabs">
    <button data-tab="progression" class="active">🧭 Ma progression</button>
    <button data-tab="officiel">🛸 Actus officielles</button>
    <button data-tab="steam">📰 Presse & Steam</button>
    <button data-tab="communaute">👥 Communauté</button>
  </nav>

  <section class="panel active" id="panel-progression">
    <div class="progress-summary">
      <div class="pct" id="global-pct">0%</div>
      <div id="global-count" style="color:var(--text-dim)"></div>
      <div class="bar"><div id="global-bar" style="width:0%"></div></div>
    </div>
    <div id="categories"></div>
    <div class="toolbar">
      <button id="btn-export">💾 Exporter ma progression</button>
      <button id="btn-import">📂 Importer</button>
      <button id="btn-reset">♻️ Réinitialiser</button>
      <input type="file" id="file-import" accept=".json" style="display:none">
    </div>
  </section>

  <section class="panel" id="panel-officiel">
    <div class="grid" id="official-list"></div>
  </section>

  <section class="panel" id="panel-steam">
    <div class="grid" id="steam-list"></div>
  </section>

  <section class="panel" id="panel-communaute">
    <div class="subtabs">
      <button data-sub="top_week" class="active">🏆 Top de la semaine</button>
      <button data-sub="hot">🔥 Tendances</button>
    </div>
    <div class="grid" id="community-list"></div>
  </section>
</div>

<script>
const LS_KEY = "nms-progress-v1";
let progressDef = null;
let communityData = null;
let communitySub = "top_week";

const fmtDate = iso => {
  if (!iso) return "";
  if (/^\d{4}-\d{2}$/.test(iso)) {
    const [y, m] = iso.split("-");
    const mois = ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
    return `${mois[+m-1]} ${y}`;
  }
  const d = new Date(iso);
  return isNaN(d) ? "" : d.toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" });
};

async function loadJSON(path) {
  try {
    const r = await fetch(path + "?t=" + Date.now());
    if (!r.ok) throw new Error(r.status);
    return await r.json();
  } catch (e) { return null; }
}

/* ---------- Onglets ---------- */
document.querySelectorAll("nav.tabs button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll("nav.tabs button").forEach(x => x.classList.remove("active"));
  document.querySelectorAll("section.panel").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  document.getElementById("panel-" + b.dataset.tab).classList.add("active");
}));

/* ---------- Progression ---------- */
function getState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
}
function setState(s) { localStorage.setItem(LS_KEY, JSON.stringify(s)); }

function renderProgress() {
  if (!progressDef) return;
  const state = getState();
  const wrap = document.getElementById("categories");
  wrap.innerHTML = "";
  let total = 0, done = 0;

  progressDef.categories.forEach(cat => {
    const catDone = cat.items.filter(i => state[i.id]).length;
    total += cat.items.length; done += catDone;
    const div = document.createElement("div");
    div.className = "cat open";
    div.innerHTML = `
      <div class="cat-head">
        <span class="icon">${cat.icon}</span>
        <h3>${cat.title}</h3>
        <span class="count">${catDone}/${cat.items.length}</span>
      </div>
      <div class="minibar"><div style="width:${cat.items.length ? Math.round(catDone/cat.items.length*100) : 0}%"></div></div>
      <ul>${cat.items.map(i => `
        <li class="${state[i.id] ? "done" : ""}">
          <label><input type="checkbox" data-id="${i.id}" ${state[i.id] ? "checked" : ""}><span>${i.label}</span></label>
        </li>`).join("")}
      </ul>`;
    div.querySelector(".cat-head").addEventListener("click", () => div.classList.toggle("open"));
    div.querySelectorAll("input[type=checkbox]").forEach(cb => cb.addEventListener("change", () => {
      const s = getState();
      if (cb.checked) s[cb.dataset.id] = true; else delete s[cb.dataset.id];
      setState(s); renderProgress();
    }));
    wrap.appendChild(div);
  });

  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("global-pct").textContent = pct + "%";
  document.getElementById("global-count").textContent = `${done} objectifs accomplis sur ${total}`;
  document.getElementById("global-bar").style.width = pct + "%";
}

document.getElementById("btn-export").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(getState(), null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "nms-progression.json";
  a.click();
});
document.getElementById("btn-import").addEventListener("click", () => document.getElementById("file-import").click());
document.getElementById("file-import").addEventListener("change", async e => {
  const f = e.target.files[0];
  if (!f) return;
  try { setState(JSON.parse(await f.text())); renderProgress(); }
  catch { alert("Fichier invalide"); }
});
document.getElementById("btn-reset").addEventListener("click", () => {
  if (confirm("Effacer toute ta progression ?")) { localStorage.removeItem(LS_KEY); renderProgress(); }
});

/* ---------- Actualités ---------- */
function newsCard(item, badge) {
  return `<div class="card">
    <h3><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></h3>
    <div class="meta">
      ${badge ? `<span class="badge ${badge.cls || ""}">${badge.txt}</span>` : ""}
      <span>${fmtDate(item.date)}</span>
      ${item.author ? `<span>${item.author}</span>` : ""}
      ${item.source ? `<span>${item.source}</span>` : ""}
    </div>
    ${item.excerpt ? `<div class="excerpt">${item.excerpt}</div>` : ""}
  </div>`;
}

function renderCommunity() {
  const list = document.getElementById("community-list");
  if (!communityData || !communityData[communitySub] || !communityData[communitySub].length) {
    list.innerHTML = `<div class="empty">Données communautaires indisponibles pour le moment.</div>`;
    return;
  }
  list.innerHTML = communityData[communitySub]
    .map(p => newsCard(p, { txt: "r/NoMansSkyTheGame" })).join("");
}
document.querySelectorAll(".subtabs button").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".subtabs button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  communitySub = b.dataset.sub;
  renderCommunity();
}));

/* ---------- Init ---------- */
(async () => {
  const [prog, official, news, community] = await Promise.all([
    loadJSON("data/progress.json"),
    loadJSON("data/official.json"),
    loadJSON("data/news.json"),
    loadJSON("data/community.json"),
  ]);

  if (prog) { progressDef = prog; renderProgress(); }
  else document.getElementById("categories").innerHTML =
    `<div class="note">Impossible de charger data/progress.json — ouvre cette page via un petit serveur local
     (<code>python3 -m http.server</code>) ou via GitHub Pages.</div>`;

  if (official && official.items) {
    document.getElementById("official-list").innerHTML =
      official.items.map(i => newsCard(i, { txt: "Hello Games", cls: "official" })).join("");
  } else {
    document.getElementById("official-list").innerHTML = `<div class="empty">Aucune donnée — lance <code>python3 scripts/fetch_news.py</code>.</div>`;
  }

  if (news && news.items) {
    document.getElementById("steam-list").innerHTML =
      news.items.map(i => newsCard(i, i.is_official ? { txt: "Officiel", cls: "official" } : { txt: i.source || "Presse" })).join("");
  } else {
    document.getElementById("steam-list").innerHTML = `<div class="empty">Aucune donnée — lance <code>python3 scripts/fetch_news.py</code>.</div>`;
  }

  communityData = community;
  renderCommunity();

  const dates = [official, news, community].filter(x => x && x.updated_at).map(x => x.updated_at);
  if (dates.length) {
    document.getElementById("updated").textContent =
      "Dernière mise à jour des données : " + new Date(dates.sort().pop()).toLocaleString("fr-FR");
  }
})();
</script>
</body>
</html>
